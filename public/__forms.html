<!--
  Static form scaffold for Netlify Forms build-time detection.
  Next.js renders the real form client-side, so Netlify's HTML scraper would not see it.
  Keep field names here in sync with content/pages/contact.md > ContactDetailsSection.form.fields.
-->
<!DOCTYPE html>
<html>
  <head>
    <title>Netlify form detection</title>
  </head>
  <body>
    <form name="contact-form" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <select name="language">
        <option>English</option>
        <option>French / Français</option>
      </select>
      <select name="format">
        <option>In-person (Zurich)</option>
        <option>Online (video call)</option>
        <option>I'm not sure yet</option>
      </select>
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
